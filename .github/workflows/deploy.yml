name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SECRET_KEY: ci-test-secret-key
          ADMIN_PASSWORD: ci-test-password
        run: |
          if [ -d tests ] && find tests -name "test_*.py" | grep -q .; then
            pytest tests/ -v
          else
            echo "No tests found — skipping pytest"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --prefer-offline

      - name: Build (production)
        env:
          NG_APP_API_URL: ${{ secrets.NG_APP_API_URL }}
        run: npm run build -- --configuration production

  # ────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered"

  # ────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Vercel auto-deploy
        run: |
          # Vercel deploys automatically via its GitHub integration.
          # No manual step is needed here — Vercel watches the 'main' branch
          # and triggers a deploy whenever this workflow pushes to it.
          #
          # To enable: connect your GitHub repo in the Vercel dashboard and set:
          #   Root Directory   → frontend
          #   Build Command    → npm run build
          #   Output Directory → dist/frontend/browser
          #   Env Variable     → NG_APP_API_URL = <your Render backend URL>
          echo "Vercel deploy handled automatically by GitHub integration"
